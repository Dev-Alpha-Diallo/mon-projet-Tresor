services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: tresorerie-app
    container_name: tresorerie-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - tresorerie-network
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: tresorerie-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tresorerie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - tresorerie-network

  redis:
    image: redis:7-alpine
    container_name: tresorerie-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - tresorerie-network
    command: redis-server --appendonly yes

  nginx:
    image: nginx:latest
    container_name: tresorerie-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - tresorerie-network
    depends_on:
      - app
      - redis

  tresorerie-backup:
    image: postgres:16
    container_name: tresorerie-backup
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - ./backups:/backups
    environment:
      - PGPASSWORD=postgres
    networks:
      - tresorerie-network
    entrypoint: >
      bash -c "
      while true; do
        echo ' Backup started at $(date)';
        DATE=$(date +%Y-%m-%d_%H-%M-%S);
        pg_dump -h db -U postgres -Fc tresorerie > /backups/backup_$${DATE}.dump;
        gzip /backups/backup_$${DATE}.dump;
        find /backups -type f -mtime +7 -delete;
        echo '✅ Backup done';
        sleep 86400;
      done
      "

volumes:
  pgdata:
  redis-data:

networks:
  tresorerie-network:
    driver: bridge
